<!--
Focus of my Experiments: How badly can I write HTML so that it will still render
Hypotheses and Findings:

Experiment 1: Broken Tags
1. Will tags still work with missing >?
    Hypothesis: yes
    Answer: yes
2. Will elements still appear with missing closing tags?
    Hypothesis: yes
    Answer: yes
3. What tags can be fully absent?
    Hypothesis: I believe we saw that you can fully omit <html> <head> <title> etc and be fine
    Answer: yup
4. What happens with tags that don't exist?
    Hypothesis: Will ignore them
    Answer: That seems to be the case

Experiment 2: Things Where They Shouldn't Be
1. What happens if you put a tag that is supposed to be wrapped in another tag somewhere else? (e.g. figcaption, li)
    Hypothesis: I think it will still appear, but not necessarily as the actual thing
    Answer: <li> still appeared as a list item, I can't tell visually if <figcaption> did too but I think it actually did
2. what happens if you put a tag where it shouldn't be? (e.g. button inside a button)
    Hypothesis: I belive it will be ignored.
    Answer: For the button inside a button, they appeared side-by-side
3. What happens if you mess up the attributes in a tag? (e.g. attribute doesn't exist, attributes twice, typos)
    Hypothesis: I believe they will also be ignored.
    Answer: Yes, the attributes that don't exist and the duplicate attributes were ignored, and many typos are ignored.
            Of course, typos in the actual attribute make it so that the attribute is then ignored.

Experiment 3: Bad Values
1. What happens when you put values that shouldn't be allowed?
    Hypothesis: I think it will ignore the element.
    Answer: I tested values such as negative numbers and very large numbers in the map, 
            and the image was actually still clickable.

Random Extra Stuff
I fear I started just adding things because I was kinda having fun so my experiments are all melded together.
But that's just like a real mad scientist experiment. Call me Frankenstein, here is my monster.
I'm sure I could have done a lot more broken stuff, but I feel like I have to learn HTML better to break it better.
-->
